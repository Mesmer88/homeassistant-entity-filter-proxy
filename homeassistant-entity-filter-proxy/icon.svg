<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="#1c2b3a"/>

  <!-- House shape -->
  <polygon points="128,42 52,108 52,198 108,198 108,148 148,148 148,198 204,198 204,108" fill="#41bdf5"/>
  <!-- Door -->
  <rect x="108" y="148" width="40" height="50" rx="4" fill="#1c2b3a"/>

  <!-- Filter funnel overlaid at bottom-right -->
  <g transform="translate(138,138) scale(0.85)">
    <!-- Funnel background circle -->
    <circle cx="60" cy="60" r="58" fill="#1c2b3a" opacity="0.85"/>
    <!-- Funnel shape -->
    <polygon points="20,20 100,20 68,58 68,95 52,105 52,58" fill="#41bdf5"/>
    <!-- Filter lines -->
    <line x1="30" y1="32" x2="90" y2="32" stroke="#1c2b3a" stroke-width="4" stroke-linecap="round"/>
    <line x1="38" y1="43" x2="82" y2="43" stroke="#1c2b3a" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
